services:
  - type: web
    name: airm
    runtime: node
    buildCommand: pnpm install && pnpm db:push && pnpm db:seed && pnpm build
    startCommand: pnpm db:push && pnpm db:seed && pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
