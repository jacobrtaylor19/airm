# Render deployment blueprint — https://render.com/docs/blueprint-spec
# Connect your repo in the Render dashboard; it will detect this file automatically.
#
# Current deployment: Standard plan, NO persistent disk.
# Data reseeds on every deploy — intentional for demo.

services:
  - type: web
    name: airm
    env: node
    region: oregon
    plan: standard
    buildCommand: corepack enable && pnpm install && pnpm db:push && pnpm db:seed && pnpm build
    startCommand: corepack enable && pnpm start
    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: ANTHROPIC_API_KEY
        sync: false              # set this manually in the Render dashboard
