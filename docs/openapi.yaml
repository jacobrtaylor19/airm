      summary: Export in SailPoint format
      description: Generates a role mapping export formatted for SailPoint IdentityNow.
      responses:
        "200":
          description: SailPoint formatted export
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/exports/grc/servicenow:
    get:
      tags: [Exports]
      summary: Export in ServiceNow format
      description: Generates a role mapping export formatted for ServiceNow IRM/GRC.
      responses:
        "200":
          description: ServiceNow formatted export
          content:
            application/json:
              schema:
