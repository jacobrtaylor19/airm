        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  # ===========================================================================
  # Releases
  # ===========================================================================
  /api/releases:
    get:
      tags: [Releases]
      summary: List all releases
      description: Returns all releases with assignment statistics (total, approved, pending).
      responses:
        "200":
          description: List of releases with stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Release"
    post:
      tags: [Releases]
      summary: Create a new release
      description: Creates a new release (go-live wave). Requires admin or system_admin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
                status:
                  type: string
                  enum: [planning, active, completed, paused]
                  default: planning
                releaseType:
                  type: string
                  default: initial
                targetSystem:
                  type: string
                targetDate:
                  type: string
                  format: date
                mappingDeadline:
                  type: string
                  format: date
                reviewDeadline:
                  type: string
                  format: date
                approvalDeadline:
                  type: string
                  format: date
                isActive:
                  type: boolean
                  default: false
      responses:
        "201":
          description: Release created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Release"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"
    put:
      tags: [Releases]
      summary: Update a release
      description: Updates an existing release by ID. Requires admin or system_admin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: integer
                name:
                  type: string
                description:
                  type: string
                status:
                  type: string
                releaseType:
                  type: string
                targetSystem:
                  type: string
                targetDate:
                  type: string
                completedDate:
                  type: string
                mappingDeadline:
                  type: string
                reviewDeadline:
                  type: string
                approvalDeadline:
                  type: string
                isActive:
                  type: boolean
      responses:
        "200":
          description: Updated release
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Release"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"
    delete:
      tags: [Releases]
      summary: Delete a release
      description: |
        Deletes a release by ID (passed as query param). Unlinks assignments first.
        Requires admin or system_admin.
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Release deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/releases/select:
    post:
      tags: [Releases]
      summary: Set the active release
      description: Switches the active release. Deactivates all others and activates the specified one.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [releaseId]
              properties:
                releaseId:
                  type: integer
      responses:
        "200":
          description: Active release switched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/releases/{id}/scope:
    get:
      tags: [Releases]
      summary: Get release scope (org units and data counts)
      description: Returns the org units linked to a release and associated data counts.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Release scope data
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Releases]
      summary: Update release scope
      description: Adds or removes org units from a release's scope.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                addOrgUnitIds:
                  type: array
                  items:
                    type: integer
                removeOrgUnitIds:
                  type: array
                  items:
                    type: integer
      responses:
        "200":
          description: Scope updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"

  # ===========================================================================
  # Jobs
  # ===========================================================================
  /api/jobs/{id}:
    get:
      tags: [Jobs]
      summary: Get background job status
      description: |
        Returns the current status of a background processing job.
        Used to poll for completion of AI pipeline and SOD analysis operations.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "400":
          description: Invalid job ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ===========================================================================
  # Notifications
  # ===========================================================================
  /api/notifications:
    get:
      tags: [Notifications]
      summary: Get notifications (inbox or sent)
      description: |
        Returns notifications for the current user. Use `?view=inbox` (default) for received
        notifications or `?view=sent` for sent notifications.
      parameters:
        - name: view
          in: query
          schema:
            type: string
            enum: [inbox, sent]
            default: inbox
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"
    post:
      tags: [Notifications]
      summary: Send notifications to users
      description: |
        Sends a notification to one or more users. Requires coordinator, admin,
        or system_admin role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [toUserIds, subject, message]
              properties:
                toUserIds:
                  type: array
                  items:
                    type: integer
                notificationType:
                  type: string
                  default: reminder
                subject:
                  type: string
                message:
                  type: string
                relatedEntityType:
                  type: string
                relatedEntityId:
                  type: integer
      responses:
        "200":
          description: Notifications sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  sent:
                    type: integer
                  ids:
                    type: array
                    items:
                      type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
    patch:
      tags: [Notifications]
      summary: Mark a notification as read
      description: Sets the notification status to `read` with the current timestamp.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: integer
      responses:
        "200":
          description: Notification marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/notifications/mark-all-read:
    post:
      tags: [Notifications]
      summary: Mark all notifications as read
      description: Marks all unread notifications for the current user as read.
      responses:
        "200":
          description: All marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  updated:
                    type: integer

  # ===========================================================================
  # Review Links
  # ===========================================================================
  /api/review-links:
    get:
      tags: [Review Links]
      summary: List all review links
      description: Returns all shareable review links. Requires admin or system_admin.
      responses:
        "200":
          description: List of review links
          content:
            application/json:
              schema:
                type: object
                properties:
                  links:
                    type: array
                    items:
                      $ref: "#/components/schemas/ReviewLink"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Review Links]
      summary: Create a review link
      description: |
        Generates a new shareable read-only review link with a 7-day expiry.
        Requires admin or system_admin.
      responses:
        "200":
          description: Review link created
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  url:
                    type: string
                    format: uri
                  expiresAt:
                    type: string
                    format: date-time
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ===========================================================================
  # Refinements
  # ===========================================================================
  /api/refinements/save:
    post:
      tags: [Refinements]
      summary: Save user-level mapping refinements
      description: |
        Persists mapper refinements (notes, confidence overrides, manual adjustments)
        for a specific user's role assignments.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId:
                  type: integer
                refinements:
                  type: object
                  description: Refinement data (notes, overrides, etc.)
      responses:
        "200":
          description: Refinements saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  # ===========================================================================
  # Least Access (Provisioning Alerts)
  # ===========================================================================
  /api/least-access/exceptions:
    post:
      tags: [Least Access]
      summary: Accept a provisioning alert exception
      description: |
        Records an exception acceptance for an over-provisioned persona-role mapping
        with a required justification. Requires admin, system_admin, or approver role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [personaId, targetRoleId, justification]
              properties:
                personaId:
                  type: integer
                targetRoleId:
                  type: integer
                excessPercent:
                  type: number
                  nullable: true
                justification:
                  type: string
      responses:
        "200":
          description: Exception accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
    delete:
      tags: [Least Access]
      summary: Revoke a provisioning alert exception
      description: Revokes a previously accepted exception. Requires admin, system_admin, or approver.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [personaId, targetRoleId]
              properties:
                personaId:
                  type: integer
                targetRoleId:
                  type: integer
      responses:
        "200":
          description: Exception revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ===========================================================================
  # Org Hierarchy
  # ===========================================================================
  /api/org-hierarchy:
    get:
      tags: [Org Hierarchy]
      summary: Get org unit tree with assigned staff
      description: |
        Returns the full organizational unit tree, plus flat lists of mappers and approvers
        for assignment dropdowns. Any authenticated user can read.
      responses:
        "200":
          description: Org hierarchy data
          content:
            application/json:
              schema:
                type: object
                properties:
                  tree:
                    type: array
                    items:
                      type: object
                      description: Nested org unit tree nodes
                  mappers:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        displayName:
                          type: string
                        role:
                          type: string
                  approvers:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        displayName:
                          type: string
                        role:
                          type: string
                  allUnits:
                    type: array
                    items:
                      $ref: "#/components/schemas/OrgUnit"
        "500":
          $ref: "#/components/responses/ServerError"
    post:
      tags: [Org Hierarchy]
      summary: Create an org unit
      description: |
        Creates a new org unit at the specified level. L2 requires an L1 parent;
        L3 requires an L2 parent. Requires system_admin role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, level]
              properties:
                name:
                  type: string
                level:
                  type: string
                  enum: [L1, L2, L3]
                parentId:
                  type: integer
                  nullable: true
                description:
                  type: string
      responses:
        "200":
          description: Org unit created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  orgUnit:
                    $ref: "#/components/schemas/OrgUnit"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"
    put:
      tags: [Org Hierarchy]
      summary: Update an org unit
      description: |
        Updates an org unit's name, description, parent, and assigned mapper/approver.
        Requires system_admin role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: integer
                name:
                  type: string
                description:
                  type: string
                parentId:
                  type: integer
                  nullable: true
                assignedMapperId:
                  type: integer
                  nullable: true
                  description: App user ID of the mapper to assign to this org unit
                assignedApproverId:
                  type: integer
                  nullable: true
                  description: App user ID of the approver to assign to this org unit
      responses:
        "200":
          description: Org unit updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"
    delete:
      tags: [Org Hierarchy]
      summary: Delete an org unit
      description: |
        Deletes an org unit. Cannot delete units that have children (delete children first).
        Unassigns linked users. Requires system_admin role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: integer
      responses:
        "200":
          description: Org unit deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  warning:
                    type: string
                    nullable: true
                    description: Present if users were unassigned as a side effect
        "400":
          description: Cannot delete (has children)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  # ===========================================================================
  # Assistant (Lumen)
  # ===========================================================================
  /api/assistant/chat:
    post:
      tags: [Assistant]
      summary: Chat with Lumen AI assistant
      description: |
        Sends a message to the Lumen AI assistant and receives a Server-Sent Events (SSE)
        stream in response. Supports tool calling (up to 3 rounds) for live data queries
        and action triggers. Rate limited (10 AI requests/min per user). maxDuration=60s.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  description: The user's message
                history:
                  type: array
                  items:
                    type: object
                    required: [role, content]
                    properties:
                      role:
                        type: string
                        enum: [user, assistant]
                      content:
                        type: string
                  description: Previous conversation messages for context
                context:
                  type: object
                  properties:
                    page:
                      type: string
                      description: Current page the user is viewing
                    userRole:
                      type: string
                    userName:
                      type: string
      responses:
        "200":
          description: SSE stream of chat responses
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Server-sent events. Each event is `data: {json}\n\n`.
                  Payload types:
                  - `{"text": "..."}` — streamed text chunk
                  - `{"tool_status": "...", "tool_name": "..."}` — tool execution progress
                  - `{"error": "..."}` — error message
                  - `[DONE]` — stream complete
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  # ===========================================================================
  # Demo
  # ===========================================================================
  /api/demo/reset:
    post:
      tags: [Demo]
      summary: Reset demo environment
      description: |
        Re-seeds the database with demo data using the active demo pack.
        Requires admin or system_admin role.
      responses:
        "200":
          description: Demo reset
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  demo:
                    type: string
                    description: Name of the demo pack used
                  message:
                    type: string
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/demo/switch:
    post:
      tags: [Demo]
      summary: Switch demo data pack
      description: |
        Switches the active demo data pack and re-seeds the database.
        Requires admin or system_admin role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pack]
              properties:
                pack:
                  type: string
                  description: Name of the demo data pack to activate
      responses:
        "200":
          description: Demo pack switched
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  demo:
                    type: string
                  message:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"

  # ===========================================================================
  # Admin - Webhooks
  # ===========================================================================
  /api/admin/webhooks:
    get:
      tags: [Admin]
      summary: List webhook endpoints or deliveries
      description: |
        Returns all webhook endpoints and supported event types. If `endpointId` query param
        is provided, returns delivery history for that endpoint. Requires admin or system_admin.
      parameters:
        - name: endpointId
          in: query
          required: false
          schema:
            type: integer
          description: If provided, returns deliveries for this endpoint instead of the endpoint list
      responses:
        "200":
          description: Webhook endpoints or deliveries
          content:
            application/json:
              schema:
                type: object
                properties:
                  endpoints:
                    type: array
                    items:
                      type: object
                  eventTypes:
                    type: array
                    items:
                      type: string
                  deliveries:
                    type: array
                    items:
                      type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"
    post:
      tags: [Admin]
      summary: Create a webhook endpoint
      description: Creates a new webhook endpoint with a generated signing secret. Requires admin or system_admin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, events]
              properties:
                url:
                  type: string
                  format: uri
                  description: Must be an HTTPS URL
                description:
                  type: string
                events:
                  type: array
                  items:
                    type: string
                  description: Event types to subscribe to
                enabled:
                  type: boolean
                  default: true
      responses:
        "200":
          description: Webhook created (includes signing secret)
          content:
            application/json:
              schema:
                type: object
                properties:
                  endpoint:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"
    patch:
      tags: [Admin]
      summary: Update a webhook endpoint
      description: Updates fields on an existing webhook endpoint. Requires admin or system_admin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: integer
                url:
                  type: string
                description:
                  type: string
                events:
                  type: array
                  items:
                    type: string
                enabled:
                  type: boolean
      responses:
        "200":
          description: Webhook updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"
    delete:
      tags: [Admin]
      summary: Delete a webhook endpoint
      description: Deletes a webhook endpoint and all its delivery history. Requires admin or system_admin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: integer
      responses:
        "200":
          description: Webhook deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  # ===========================================================================
  # Admin - Scheduled Exports
  # ===========================================================================
  /api/admin/scheduled-exports:
    get:
      tags: [Admin]
      summary: List scheduled exports
      description: Returns all scheduled export configurations and supported export types. Requires admin or system_admin.
      responses:
        "200":
          description: Scheduled exports list
          content:
            application/json:
              schema:
                type: object
                properties:
                  exports:
                    type: array
                    items:
                      type: object
                  exportTypes:
                    type: array
                    items:
                      type: object
                      properties:
                        value:
                          type: string
                        label:
                          type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"
    post:
      tags: [Admin]
      summary: Create a scheduled export
      description: Creates a new recurring export schedule. Requires admin or system_admin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, exportType, schedule]
              properties:
                name:
                  type: string
                exportType:
                  type: string
                schedule:
                  type: string
                  enum: [daily, weekly, monthly]
                dayOfWeek:
                  type: integer
                  nullable: true
                  description: 0-6 (Sunday-Saturday), used for weekly
                dayOfMonth:
                  type: integer
                  nullable: true
                  description: 1-31, used for monthly
                hour:
                  type: integer
                  default: 6
                  description: Hour of day (0-23) to run the export
                enabled:
                  type: boolean
                  default: true
      responses:
        "200":
          description: Scheduled export created
          content:
            application/json:
              schema:
                type: object
                properties:
                  export:
                    type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"
    patch:
      tags: [Admin]
      summary: Update a scheduled export
      description: Updates fields on an existing scheduled export. Recalculates next run time if schedule changes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: integer
                name:
                  type: string
                schedule:
                  type: string
                  enum: [daily, weekly, monthly]
                dayOfWeek:
                  type: integer
                  nullable: true
                dayOfMonth:
                  type: integer
                  nullable: true
                hour:
                  type: integer
                enabled:
                  type: boolean
      responses:
        "200":
          description: Scheduled export updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"
    delete:
      tags: [Admin]
      summary: Delete a scheduled export
      description: Permanently deletes a scheduled export configuration. Requires admin or system_admin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: integer
      responses:
        "200":
          description: Scheduled export deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  # ===========================================================================
  # Calibration
  # ===========================================================================
  /api/calibration:
    get:
      tags: [Dashboard & Health]
      summary: Get low-confidence persona assignments for calibration
      description: |
        Returns persona assignments below the specified confidence threshold for manual
        review and calibration. Scoped to the current user's org unit.
      parameters:
        - name: threshold
          in: query
          schema:
            type: integer
            default: 70
          description: Confidence score threshold (0-100). Returns assignments at or below this value.
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
          description: Maximum number of results to return
      responses:
        "200":
          description: Low-confidence assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    assignmentId:
                      type: integer
                    userId:
                      type: integer
                    personaId:
                      type: integer
                    confidenceScore:
                      type: number
                    aiReasoning:
                      type: string
                      nullable: true
                    userName:
                      type: string
                    department:
                      type: string
                      nullable: true
                    personaName:
                      type: string
                    personaDescription:
                      type: string
                      nullable: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  # ===========================================================================
  # Cron
  # ===========================================================================
  /api/cron/exports:
    get:
      tags: [Admin]
      summary: Process due scheduled exports (cron endpoint)
      description: |
        Called by Vercel cron jobs to process any scheduled exports that are due.
        Authenticated via `CRON_SECRET` bearer token in the Authorization header.
      security:
        - {}
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: "Bearer {CRON_SECRET}"
      responses:
        "200":
          description: Cron run results
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  processed:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        status:
                          type: string
        "401":
          description: Invalid cron secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ===========================================================================
  # Docs (this spec)
  # ===========================================================================
  /api/docs/openapi:
    get:
      tags: [Dashboard & Health]
      summary: Serve this OpenAPI spec
      description: Returns the OpenAPI 3.1 YAML specification for the Provisum API.
      security: []
      responses:
        "200":
          description: OpenAPI YAML spec
          content:
            application/yaml:
              schema:
                type: string
        "404":
          description: Spec file not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
