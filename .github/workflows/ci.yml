name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: airm/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: airm
      - run: pnpm lint
        working-directory: airm
      - run: pnpm build
        working-directory: airm

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: airm/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: airm
      - run: pnpm audit --audit-level=high
        working-directory: airm
        continue-on-error: false
